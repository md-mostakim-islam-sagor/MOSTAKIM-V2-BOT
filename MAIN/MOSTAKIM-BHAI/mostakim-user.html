<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>User Panel — MOSTAKIM V2</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d1a;--surface:#12122a;--card:#181834;--border:#2a2a5a;
  --accent:#6c63ff;--accent2:#ff6584;--green:#00d68f;--text:#e8e8ff;--muted:#8888bb;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* HEADER */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:50}
.header-left{display:flex;align-items:center;gap:10px}
.logo{font-size:18px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;display:inline-block}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.logout-btn{padding:7px 16px;border-radius:8px;background:rgba(255,56,96,.1);color:#ff3860;border:1px solid rgba(255,56,96,.3);font-size:12px;font-weight:600;cursor:pointer;transition:.2s}
.logout-btn:hover{background:#ff3860;color:#fff}

/* MAIN TABS */
.main-tabs{display:flex;gap:0;background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px}
.main-tab{padding:14px 22px;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);border-bottom:3px solid transparent;transition:.2s;display:flex;align-items:center;gap:6px;white-space:nowrap}
.main-tab:hover{color:var(--text)}
.main-tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* SECTIONS */
.section{display:none;padding:20px 24px}
.section.active{display:block}

/* CATEGORY FILTER TABS */
.cat-tabs-wrap{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;padding:14px 0 10px}
.cat-tab{padding:6px 16px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:.2s;white-space:nowrap}
.cat-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.cat-tab:hover:not(.active){border-color:var(--accent);color:var(--text)}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:16px}
.search-wrap input{width:100%;padding:10px 16px 10px 40px;background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;outline:none;transition:.2s}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap::before{content:'🔍';position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:14px}

/* STATS BAR */
.stats-bar{display:flex;gap:20px;padding:10px 0 16px;flex-wrap:wrap}
.stat-item{font-size:12px;color:var(--muted)}.stat-item strong{color:var(--text)}

/* CMD GRID */
.cmd-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px}
.cmd-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;transition:.25s;position:relative;overflow:hidden}
.cmd-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.cmd-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 24px rgba(108,99,255,.15)}
.cmd-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:7px}
.cmd-name{font-size:14px;font-weight:700;color:var(--text)}
.cmd-badge{font-size:10px;font-weight:600;padding:2px 9px;border-radius:20px}
.cmd-desc{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:10px;min-height:30px}
.cmd-meta{display:flex;gap:6px;flex-wrap:wrap}
.meta-item{font-size:11px;color:var(--muted);background:var(--surface);border:1px solid var(--border);padding:2px 8px;border-radius:6px}
.meta-item strong{color:var(--text)}

/* BADGES */
.badge-admin{background:rgba(108,99,255,.2);color:#a89fff}
.badge-fun{background:rgba(255,101,132,.2);color:#ff8fa8}
.badge-info{background:rgba(0,214,143,.2);color:#00d68f}
.badge-group{background:rgba(255,221,87,.2);color:#e8c800}
.badge-media{background:rgba(108,199,255,.2);color:#6cc7ff}
.badge-tool{background:rgba(200,200,255,.2);color:#c8c8ff}
.badge-economy{background:rgba(255,180,50,.2);color:#ffb432}
.badge-nsfw{background:rgba(255,50,50,.2);color:#ff5050}
.badge-game{background:rgba(100,255,100,.2);color:#64ff64}
.badge-utility{background:rgba(150,200,255,.2);color:#96c8ff}
.badge-default{background:rgba(136,136,187,.2);color:#8888bb}

/* BOT INFO CARDS */
.info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-bottom:24px}
.info-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;position:relative;overflow:hidden}
.info-card::before{content:'';position:absolute;top:0;right:0;width:50px;height:50px;background:linear-gradient(135deg,var(--accent),transparent);opacity:.1;border-radius:0 12px 0 50px}
.info-card .ic-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.info-card .ic-value{font-size:20px;font-weight:700;color:var(--text)}
.info-card .ic-icon{font-size:22px;position:absolute;top:14px;right:14px;opacity:.5}

.info-table{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.info-table-header{padding:14px 18px;border-bottom:1px solid var(--border);font-size:13px;font-weight:700}
.info-table table{width:100%;border-collapse:collapse}
.info-table td{padding:10px 18px;border-bottom:1px solid rgba(42,42,90,.4);font-size:13px}
.info-table tr:last-child td{border-bottom:none}
.info-table td:first-child{color:var(--muted);width:160px}
.info-table td:last-child{color:var(--text);font-weight:600}
.info-table tr:hover td{background:rgba(108,99,255,.04)}

/* ADMIN INFO */
.admin-tabs-wrap{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.admin-tab{padding:6px 18px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:.2s}
.admin-tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-color:transparent}
.admin-tab:hover:not(.active){border-color:var(--accent);color:var(--text)}

.admin-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.admin-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px}
.admin-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.admin-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:2px}
.admin-uid{font-size:11px;color:var(--muted);word-break:break-all;margin-bottom:1px}
.admin-type{font-size:10px;color:var(--accent);margin-top:2px;font-weight:600}

.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.empty .icon{font-size:40px;margin-bottom:10px}
.empty p{font-size:13px}

/* LOADING */
.loading-screen{display:flex;align-items:center;justify-content:center;min-height:200px;flex-direction:column;gap:12px;color:var(--muted)}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:600px){.cmd-grid{grid-template-columns:1fr}.info-grid{grid-template-columns:1fr 1fr}.main-tab{padding:12px 14px;font-size:12px}.section{padding:16px}}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="logo">⚡ MOSTAKIM V2</div>
    <span class="status-dot"></span>
    <span style="font-size:12px;color:var(--green)">Online</span>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <span style="font-size:13px;color:var(--muted)">👤 <span id="header-user">User</span></span>
    <button class="logout-btn" onclick="doLogout()">🚪 Logout</button>
  </div>
</div>

<!-- MAIN TABS -->
<div class="main-tabs">
  <div class="main-tab active" onclick="switchTab('commands')" id="mtab-commands">📦 Commands</div>
  <div class="main-tab" onclick="switchTab('botinfo')" id="mtab-botinfo">🤖 Bot Info</div>
  <div class="main-tab" onclick="switchTab('admininfo')" id="mtab-admininfo">👑 Admin Info</div>
</div>

<!-- ===== COMMANDS TAB ===== -->
<div class="section active" id="sec-commands">
  <div class="cat-tabs-wrap" id="cat-tabs">
    <div class="cat-tab active" onclick="setCat('all')" data-cat="all">🌐 All</div>
  </div>
  <div class="search-wrap">
    <input type="text" id="cmd-search" placeholder="Command name ba description diye search koro..." oninput="applyFilter()"/>
  </div>
  <div class="stats-bar">
    <div class="stat-item">📦 Total: <strong id="total-count">0</strong></div>
    <div class="stat-item">🔍 Showing: <strong id="show-count">0</strong></div>
    <div class="stat-item">📁 Category: <strong id="cat-label">All</strong></div>
  </div>
  <div id="cmd-content">
    <div class="loading-screen"><div class="spinner"></div><span>Commands load hocche...</span></div>
  </div>
</div>

<!-- ===== BOT INFO TAB ===== -->
<div class="section" id="sec-botinfo">
  <div id="botinfo-content">
    <div class="loading-screen"><div class="spinner"></div><span>Bot info load hocche...</span></div>
  </div>
</div>

<!-- ===== ADMIN INFO TAB ===== -->
<div class="section" id="sec-admininfo">
  <div class="admin-tabs-wrap" id="admin-role-tabs">
    <div class="admin-tab active" onclick="setAdminRole('adminbot')" data-role="adminbot">🔴 Admin Bot</div>
    <div class="admin-tab" onclick="setAdminRole('superadmin')" data-role="superadmin">⭐ Super Admin</div>
    <div class="admin-tab" onclick="setAdminRole('dev')" data-role="dev">💻 Developer</div>
    <div class="admin-tab" onclick="setAdminRole('premium')" data-role="premium">💎 Premium</div>
    <div class="admin-tab" onclick="setAdminRole('vip')" data-role="vip">👑 VIP</div>
  </div>
  <div id="admin-list-content">
    <div class="loading-screen"><div class="spinner"></div><span>Admin list load hocche...</span></div>
  </div>
</div>

<script>
let allCommands = [], filteredCmds = [], currentCat = 'all';
let adminData = {}, currentAdminRole = 'adminbot';
let botInfoLoaded = false, adminInfoLoaded = false;

async function api(url, opts = {}) {
  const r = await fetch(url, { credentials: 'include', headers: { 'Content-Type': 'application/json' }, ...opts });
  if (r.status === 401) { location.href = '/panel/login'; return null; }
  return r.json();
}

function switchTab(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.main-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('sec-' + name).classList.add('active');
  document.getElementById('mtab-' + name).classList.add('active');
  if (name === 'commands' && !allCommands.length) loadCommands();
  if (name === 'botinfo' && !botInfoLoaded) loadBotInfo();
  if (name === 'admininfo' && !adminInfoLoaded) loadAdminInfo();
}

/* ===== COMMANDS ===== */
function catBadgeClass(cat) {
  const c = (cat || '').toLowerCase();
  if (c.includes('admin')) return 'badge-admin';
  if (c.includes('fun')) return 'badge-fun';
  if (c.includes('info')) return 'badge-info';
  if (c.includes('group')) return 'badge-group';
  if (c.includes('media')) return 'badge-media';
  if (c.includes('tool')) return 'badge-tool';
  if (c.includes('economy')) return 'badge-economy';
  if (c.includes('nsfw')) return 'badge-nsfw';
  if (c.includes('game')) return 'badge-game';
  if (c.includes('utility')) return 'badge-utility';
  return 'badge-default';
}

function catEmoji(cat) {
  const c = (cat || '').toLowerCase();
  if (c.includes('admin')) return '🔐';
  if (c.includes('fun')) return '😄';
  if (c.includes('info')) return 'ℹ️';
  if (c.includes('group')) return '👥';
  if (c.includes('media')) return '🎬';
  if (c.includes('tool')) return '🔧';
  if (c.includes('economy')) return '💰';
  if (c.includes('nsfw')) return '🔞';
  if (c.includes('game')) return '🎮';
  if (c.includes('utility')) return '⚙️';
  return '📌';
}

function setCat(cat) {
  currentCat = cat;
  document.getElementById('cat-label').textContent = cat === 'all' ? 'All' : cat;
  document.querySelectorAll('.cat-tab').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  applyFilter();
}

function applyFilter() {
  const q = (document.getElementById('cmd-search').value || '').toLowerCase();
  filteredCmds = allCommands.filter(c => {
    const matchCat = currentCat === 'all' || (c.category || '').toLowerCase() === currentCat.toLowerCase();
    const matchQ = !q || c.name.toLowerCase().includes(q) || (c.description || '').toLowerCase().includes(q);
    return matchCat && matchQ;
  });
  document.getElementById('show-count').textContent = filteredCmds.length;
  renderCmdGrid();
}

function renderCmdGrid() {
  const el = document.getElementById('cmd-content');
  if (!filteredCmds.length) {
    el.innerHTML = '<div class="empty"><div class="icon">🔍</div><p>Kono command paoa jaini</p></div>';
    return;
  }
  el.innerHTML = `<div class="cmd-grid">${filteredCmds.map(c => `
    <div class="cmd-card">
      <div class="cmd-head">
        <div class="cmd-name">/${escHtml(c.name)}</div>
        <span class="cmd-badge ${catBadgeClass(c.category)}">${escHtml(c.category || 'General')}</span>
      </div>
      <div class="cmd-desc">${escHtml(c.description || 'No description available.')}</div>
      <div class="cmd-meta">
        ${c.usage ? `<div class="meta-item">⌨️ <strong>${escHtml(c.usage)}</strong></div>` : ''}
        ${c.cooldown ? `<div class="meta-item">⏱️ <strong>${c.cooldown}s</strong></div>` : ''}
      </div>
    </div>`).join('')}</div>`;
}

async function loadCommands() {
  const data = await api('/panel/api/commands');
  if (!data) return;
  allCommands = data;
  filteredCmds = data;
  document.getElementById('total-count').textContent = data.length;
  document.getElementById('show-count').textContent = data.length;

  const cats = [...new Set(data.map(c => c.category || 'General'))].sort();
  const catWrap = document.getElementById('cat-tabs');
  catWrap.innerHTML = `<div class="cat-tab active" onclick="setCat('all')" data-cat="all">🌐 All (${data.length})</div>`;
  cats.forEach(cat => {
    const count = data.filter(c => (c.category || 'General') === cat).length;
    const btn = document.createElement('div');
    btn.className = 'cat-tab';
    btn.dataset.cat = cat;
    btn.textContent = `${catEmoji(cat)} ${cat} (${count})`;
    btn.onclick = () => setCat(cat);
    catWrap.appendChild(btn);
  });

  renderCmdGrid();
}

/* ===== BOT INFO ===== */
async function loadBotInfo() {
  const data = await api('/panel/api/user-stats');
  if (!data) return;
  botInfoLoaded = true;

  document.getElementById('botinfo-content').innerHTML = `
    <div class="info-grid">
      <div class="info-card">
        <div class="ic-label">Bot Status</div>
        <div class="ic-value" style="font-size:15px">${escHtml(data.botStatus)}</div>
        <div class="ic-icon">🤖</div>
      </div>
      <div class="info-card">
        <div class="ic-label">Commands</div>
        <div class="ic-value">${data.commandCount}</div>
        <div class="ic-icon">📦</div>
      </div>
      <div class="info-card">
        <div class="ic-label">Events</div>
        <div class="ic-value">${data.eventCount}</div>
        <div class="ic-icon">⚡</div>
      </div>
      <div class="info-card">
        <div class="ic-label">Active Groups</div>
        <div class="ic-value">${data.threadCount}</div>
        <div class="ic-icon">💬</div>
      </div>
      <div class="info-card">
        <div class="ic-label">Total Users</div>
        <div class="ic-value">${data.userCount}</div>
        <div class="ic-icon">👥</div>
      </div>
      <div class="info-card">
        <div class="ic-label">Uptime</div>
        <div class="ic-value" style="font-size:15px">${escHtml(data.uptime)}</div>
        <div class="ic-icon">⏱️</div>
      </div>
    </div>
    <div class="info-table">
      <div class="info-table-header">📋 Detailed Info</div>
      <table>
        <tr><td>🤖 Bot Name</td><td>${escHtml(data.botName)}</td></tr>
        <tr><td>⌨️ Prefix</td><td>${escHtml(data.prefix)}</td></tr>
        <tr><td>🌐 Platform</td><td>${escHtml(data.platform)}</td></tr>
        <tr><td>🟢 Node.js</td><td>${escHtml(data.nodeVersion)}</td></tr>
      </table>
    </div>`;
}

/* ===== ADMIN INFO ===== */
function setAdminRole(role) {
  currentAdminRole = role;
  document.querySelectorAll('.admin-tab').forEach(t => t.classList.toggle('active', t.dataset.role === role));
  renderAdminList();
}

function renderAdminList() {
  const list = adminData[currentAdminRole] || [];
  const roleLabels = { adminbot: 'Admin Bot', superadmin: 'Super Admin', dev: 'Developer', premium: 'Premium', vip: 'VIP' };
  const roleEmojis = { adminbot: '🔴', superadmin: '⭐', dev: '💻', premium: '💎', vip: '👑' };
  const el = document.getElementById('admin-list-content');

  if (!list.length) {
    el.innerHTML = `<div class="empty"><div class="icon">${roleEmojis[currentAdminRole] || '👤'}</div><p>${roleLabels[currentAdminRole]} list-e keu nei</p></div>`;
    return;
  }

  el.innerHTML = `<div class="admin-list">${list.map(entry => {
    const uid = typeof entry === 'object' ? entry.uid : entry;
    const name = typeof entry === 'object' ? entry.name : null;
    return `
    <div class="admin-card">
      <div class="admin-avatar">${roleEmojis[currentAdminRole] || '👤'}</div>
      <div>
        <div class="admin-name">${name ? escHtml(name) : '<span style="color:var(--muted);font-style:italic">Unknown</span>'}</div>
        <div class="admin-uid">🆔 ${escHtml(uid)}</div>
        <div class="admin-type">${escHtml(roleLabels[currentAdminRole] || currentAdminRole)}</div>
      </div>
    </div>`;
  }).join('')}</div>`;
}

async function loadAdminInfo() {
  const data = await api('/panel/api/user-admins');
  if (!data) return;
  adminData = data;
  adminInfoLoaded = true;
  renderAdminList();
}

function escHtml(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function doLogout() {
  await api('/panel/logout', { method: 'POST' });
  location.href = '/panel/login';
}

async function init() {
  const me = await api('/panel/me');
  if (me && me.username) document.getElementById('header-user').textContent = me.username;
  loadCommands();
}

init();
</script>
</body>
</html>
